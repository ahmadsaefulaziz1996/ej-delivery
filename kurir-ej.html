<script>
    // ... (Logika Firebase & formatTglDB tetap sama) ...

    function renderList() {
        const keyword = document.getElementById('searchBar').value.toLowerCase();
        let html = "", s = 0, g = 0, p = 0, totalCodSuksesGlobal = 0;

        allOrders.forEach(o => {
            const isSisa = (o.status !== 'Terkirim' && o.status !== 'Gagal');
            if (o.tanggal === todayStr) {
                if (o.status === 'Terkirim') s++; else if (o.status === 'Gagal') g++;
            }
            if (isSisa) p++;
            if (o.status === 'Terkirim' && o.metode === 'COD') totalCodSuksesGlobal += Number(o.total || 0);

            if (isSisa || o.tanggal === todayStr) {
                const matchSearch = (o.namaPembeli || "").toLowerCase().includes(keyword);
                const matchStatus = (currentFilter === "Sisa") ? isSisa : (o.status === currentFilter && o.tanggal === todayStr);

                if (matchSearch && matchStatus) {
                    const wa = String(o.nohp || "").replace(/\D/g, '').replace(/^0/,'62');
                    
                    html += `<div class="order-card">
                        <div class="date-tag">${o.tanggal}</div>
                        <h3>${o.namaPembeli}</h3>
                        <p style="font-size:11px; opacity:0.7;">📍 ${o.alamat}</p>
                        <p style="color:var(--gold); font-weight:800; font-size:12px; margin-top:5px;">${o.metode} | Rp${Number(o.total || 0).toLocaleString()}</p>
                        
                        ${isSisa ? `
                        <div class="btn-group">
                            <button class="btn" style="background:var(--safe)" onclick="takePhoto('${o.id}')">📸 SUKSES</button>
                            <button class="btn" style="background:var(--danger)" onclick="pilihanGagal('${o.id}')">⚠️ KENDALA</button>
                        </div>` : `
                        <div style="margin-top:10px; padding-top:10px; border-top:1px dashed rgba(255,255,255,0.1)">
                            <p style="color:var(--gold); font-size:10px; font-weight:800;">STATUS: ${o.status.toUpperCase()}</p>
                            ${o.catatan ? `<p style="font-size:10px; color:var(--danger); margin-top:3px;">📝 Catatan: ${o.catatan}</p>` : ''}
                        </div>`}
                        
                        <div class="btn-group">
                            ${o.mapLink ? `<a href="${o.mapLink}" target="_blank" class="btn" style="background:var(--blue)">MAPS</a>` : ''}
                            
                            <a href="https://wa.me/${wa}" class="btn" style="background:var(--wa)" ${!o.mapLink ? 'style="grid-column: span 2;"' : ''}>WA</a>
                        </div>
                    </div>`;
                }
            }
        });
        // ... (Bagian update UI dashboard tetap sama)
    }
    // ... (Sisa fungsi lainnya tetap sama)
</script>
