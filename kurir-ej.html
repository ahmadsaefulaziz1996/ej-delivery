<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJ DELIVERY - KURIR</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(212, 175, 55, 0.2); --text-main: #FFFFFF; --safe: #22C55E; --danger: #EF4444; --warning: #FACC15; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text-main); padding: 15px; padding-bottom: 50px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo-text { color: var(--gold); font-weight: 800; font-size: 18px; letter-spacing: 1px; }
        .glass-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .order-item { border-bottom: 1px solid rgba(255,255,255,0.1); padding: 15px 0; position: relative; }
        .btn { border: none; padding: 12px; border-radius: 10px; font-weight: 800; font-size: 12px; cursor: pointer; color: white; width: 100%; transition: 0.3s; }
        .btn-success { background: var(--safe); }
        .btn-warning { background: var(--warning); color: black; }
        .btn-maps { background: #2563eb; text-decoration: none; text-align: center; display: block; margin-top: 10px; }
        .status-badge { font-size: 10px; padding: 4px 8px; border-radius: 5px; font-weight: 800; text-transform: uppercase; }
        .loading { text-align: center; padding: 50px; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-text">EJ DELIVERY <span style="font-weight:400; font-size:12px; color:white;">| KURIR</span></div>
        <div id="clock" style="font-size: 12px; font-weight: 800; color: var(--gold);">00:00:00</div>
    </div>

    <div id="orderList">
        <div class="loading">Memuat data pengiriman...</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAVQGysGRlYJ2b4PekM3vaXKtx6UFvNlCk", databaseURL: "https://ej-tobacco-express-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID');
        }
        setInterval(updateClock, 1000);

        // Ambil data pesanan (hanya yang belum terkirim/cancel atau yang hari ini)
        db.ref('pesanan').on('value', snap => {
            const orders = snap.val();
            const listContainer = document.getElementById('orderList');
            listContainer.innerHTML = "";

            if (!orders) {
                listContainer.innerHTML = `<div class="loading">Tidak ada pengiriman hari ini.</div>`;
                return;
            }

            Object.keys(orders).reverse().forEach(id => {
                const o = orders[id];
                
                // Kurir hanya melihat yang "Menunggu" atau "Tunda"
                if (o.status === 'Terkirim' || o.status === 'Gagal') return;

                const card = document.createElement('div');
                card.className = 'glass-card order-item';
                
                let alasanHtml = o.alasanTunda ? `<div style="color:var(--warning); font-size:11px; margin-top:5px; font-weight:800;">⚠️ KENDALA: ${o.alasanTunda}</div>` : "";

                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between;">
                        <span style="font-size:10px; color:var(--gold); font-weight:800;">${o.noPesanan}</span>
                        <span class="status-badge" style="background:rgba(255,255,255,0.1)">${o.status}</span>
                    </div>
                    <div style="margin-top:10px;">
                        <b style="font-size:16px;">${o.namaPembeli}</b><br>
                        <p style="font-size:12px; margin-top:5px; opacity:0.8;">📍 ${o.alamat}</p>
                        ${alasanHtml}
                        <div style="margin-top:10px; font-weight:800; color:var(--safe);">TAGIHAN: Rp${Number(o.total).toLocaleString()} (${o.metode})</div>
                    </div>
                    
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px;">
                        <button class="btn btn-success" onclick="prosesSukses('${id}')">✅ SUKSES</button>
                        <button class="btn btn-warning" onclick="prosesTunda('${id}')">⚠️ TUNDA</button>
                    </div>
                    
                    ${o.mapLink ? `<a href="${o.mapLink}" class="btn btn-maps" target="_blank">📍 BUKA MAPS</a>` : ''}
                    
                    <input type="file" id="file-${id}" accept="image/*" capture="camera" style="display:none;" onchange="uploadFoto('${id}', this)">
                `;
                listContainer.appendChild(card);
            });
        });

        // 1. FUNGSI SUKSES (Wajib Foto)
        function prosesSukses(id) {
            if(confirm("Pastikan uang sudah diterima. Ambil foto bukti?")) {
                document.getElementById('file-' + id).click();
            }
        }

        function uploadFoto(id, input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Image = e.target.result;
                
                // Simpan ke Firebase
                db.ref('pesanan/' + id).update({
                    status: 'Terkirim',
                    buktiFoto: base64Image,
                    waktuSelesai: new Date().toLocaleTimeString('id-ID'),
                    alasanTunda: null // Hapus alasan tunda jika sudah sukses
                }).then(() => {
                    alert("Data Berhasil Terkirim!");
                });
            };
            reader.readAsDataURL(file);
        }

        // 2. FUNGSI TUNDA (Wajib Isi Alasan)
        function prosesTunda(id) {
            const alasan = prompt("Kenapa kiriman ditunda?\nContoh: Rumah Kosong / Orang tidak ada");
            if (alasan != null && alasan != "") {
                db.ref('pesanan/' + id).update({
                    status: 'Tunda',
                    alasanTunda: alasan, // Sesuai dengan yang dibaca Admin
                    waktuUpdate: new Date().toLocaleTimeString('id-ID')
                }).then(() => {
                    alert("Status Tunda Tersimpan.");
                });
            }
        }
    </script>
</body>
</html>
