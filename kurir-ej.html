<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EJ KURIR V4 - ULTRA PREMIUM</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    
    <style>
        :root { 
            --gold: #D4AF37; --bg: #050505; --glass: rgba(255, 255, 255, 0.05); 
            --glass-border: rgba(212, 175, 55, 0.3); --text-main: #FFFFFF; 
            --safe: #22C55E; --warning: #F59E0B; --danger: #EF4444; 
            --blue: #3B82F6; --wa: #25D366; --offline: #A855F7;
            --gradient-gold: linear-gradient(135deg, #F7E08C, #D4AF37);
            --gradient-dark: linear-gradient(145deg, #111, #000);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        html, body { overscroll-behavior-y: none; }
        body { background: var(--bg); color: var(--text-main); padding: 15px; padding-bottom: 100px; overflow-x: hidden; user-select: none; transition: 0.3s; }
        ::-webkit-scrollbar { display: none; }

        .sortable-ghost { opacity: 0.3; background: rgba(212,175,55,0.1) !important; border: 2px dashed var(--gold) !important; }
        .sortable-drag { opacity: 1 !important; box-shadow: 0 20px 40px rgba(0,0,0,0.8) !important; transform: scale(1.02) !important; }
        .drag-handle { cursor: grab; }

        .swipe-bg { position: absolute; inset: 0; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; font-weight: 800; font-size: 14px; z-index: 0; }
        .swipe-content { position: relative; z-index: 1; background: var(--gradient-dark); transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1); touch-action: pan-y; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; position: sticky; top: 0; z-index: 9999; background: rgba(5,5,5,0.85); backdrop-filter: blur(15px); padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .main-logo-text { color: var(--gold); font-weight: 800; font-size: 20px; letter-spacing: 1px; text-transform: uppercase; }
        
        .wallet-card { background: var(--gradient-dark); border: 1px solid var(--safe); border-radius: 20px; padding: 20px; margin-bottom: 20px; text-align: center; position: relative; }
        #totalCOD { display: block; font-size: 32px; font-weight: 800; color: var(--safe); margin-top: 5px; }

        .tab-menu { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .tab-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 12px 5px; border-radius: 12px; color: #fff; font-weight: 800; font-size: 10px; text-align: center; cursor: pointer; }
        .tab-btn.active { background: rgba(212, 175, 55, 0.15); border-color: var(--gold); color: var(--gold); }

        .search-box { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 14px 15px 14px 45px; color: white; outline: none; margin-bottom: 15px; }
        .glass-card { background: var(--gradient-dark); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; margin-bottom: 15px; position: relative; overflow: hidden; }
        .btn-main { background: var(--gradient-gold); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; }
        .action-btn { border: none; padding: 12px; border-radius: 10px; font-size: 10px; font-weight: 800; color: white; cursor: pointer; }
        
        body.is-offline #orderContainer { pointer-events: none; opacity: 0.5; }
        .order-badge { padding: 5px 12px; border-radius: 20px; font-size: 9px; font-weight: 800; display: inline-flex; align-items: center; gap: 5px; }
        .badge-gudang { background: rgba(59,130,246,0.2); color: #60A5FA; border: 1px solid #3B82F6; }
        .badge-proses { background: rgba(212,175,55,0.2); color: var(--gold); border: 1px solid var(--gold); }
        .badge-sukses { background: rgba(34,197,94,0.2); color: #4ADE80; border: 1px solid #22C55E; }
        .badge-gagal { background: rgba(239,68,68,0.2); color: #F87171; border: 1px solid #EF4444; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100000; flex-direction: column; justify-content: flex-end; align-items: center; backdrop-filter: blur(5px); }
        .bottom-sheet { width: 100%; max-width: 500px; border-radius: 30px 30px 0 0; padding: 20px 20px 40px 20px; }
        .modal-input { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 14px 15px; color: white; margin-bottom: 15px; }

        body.sunlight-mode { background: #E5E7EB; color: #111; }
        body.sunlight-mode .glass-card, body.sunlight-mode .wallet-card { background: white !important; border: 1px solid #ccc !important; color: #111; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div style="text-align: center; width: 320px;">
            <i class="fa-solid fa-motorcycle" style="font-size: 40px; color: var(--gold); margin-bottom: 15px;"></i>
            <h2 style="color:#fff;">EJ ACCESS</h2>
            <select id="namaKurirInput" style="width: 100%; background: #111; color: var(--gold); border: 1px solid var(--gold); padding: 15px; border-radius: 12px; font-weight: 800; margin: 20px 0;">
                <option value="kurirA">KURIR - kurirA</option>
                <option value="kurirB">KURIR - kurirB</option>
                <option value="kurirC">KURIR - kurirC</option>
            </select>
            <div class="pin-display" id="pinDisplay">****</div>
            <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:15px;">
                <button class="num-btn" onclick="pressPin('1')">1</button><button class="num-btn" onclick="pressPin('2')">2</button><button class="num-btn" onclick="pressPin('3')">3</button>
                <button class="num-btn" onclick="pressPin('4')">4</button><button class="num-btn" onclick="pressPin('5')">5</button><button class="num-btn" onclick="pressPin('6')">6</button>
                <button class="num-btn" onclick="pressPin('7')">7</button><button class="num-btn" onclick="pressPin('8')">8</button><button class="num-btn" onclick="pressPin('9')">9</button>
                <button class="num-btn" onclick="pressPin('C')">C</button><button class="num-btn" onclick="pressPin('0')">0</button><button class="num-btn" onclick="pressPin('OK')">OK</button>
            </div>
        </div>
    </div>

    <div class="header">
        <div class="main-logo-text">EJ TOBACCO</div>
        <div style="text-align: right;">
            <div id="clock" style="font-size: 14px; font-weight: 800; color: var(--safe);">00:00:00</div>
            <div id="teksKoneksi" style="font-size: 9px; font-weight: 800; color: var(--safe);">ONLINE</div>
        </div>
    </div>

    <div class="wallet-card">
        <span style="font-size:10px;">DOMPET COD HARI INI</span>
        <b id="totalCOD">Rp 0</b>
        <div style="display: flex; justify-content: space-between; margin-top: 15px;">
            <div style="text-align: left;"><span style="font-size: 8px;">KELUAR</span><b id="totalPengeluaran" style="color: var(--danger);">Rp 0</b></div>
            <div style="text-align: right;"><span style="font-size: 8px;">WAJIB SETOR</span><b id="setoranBersih" style="color: var(--gold);">Rp 0</b></div>
        </div>
        <button onclick="tambahPengeluaran()" class="btn-main" style="margin-top: 10px; font-size: 10px;">CATAT PENGELUARAN</button>
    </div>

    <div class="tab-menu">
        <div class="tab-btn" id="t-Gudang" onclick="setTab('Gudang')">GUDANG <span id="c-Gudang">0</span></div>
        <div class="tab-btn active" id="t-Proses" onclick="setTab('Proses')">TAS SAYA <span id="c-Proses">0</span></div>
        <div class="tab-btn" id="t-Terkirim" onclick="setTab('Terkirim')">SUKSES <span id="c-Terkirim">0</span></div>
        <div class="tab-btn" id="t-Gagal" onclick="setTab('Gagal')">CANCEL <span id="c-Gagal">0</span></div>
    </div>

    <div class="input-group">
        <input type="text" id="searchOrder" class="search-box" placeholder="Cari pesanan..." oninput="renderOrders()">
    </div>

    <div id="orderContainer"></div>

    <div id="modalPenerima" class="modal-overlay">
        <div class="glass-card bottom-sheet">
            <h2 style="color:var(--safe); text-align:center;">PAKET DITERIMA</h2>
            <input type="text" id="inputNamaPenerima" class="modal-input" placeholder="Nama Penerima...">
            <div id="kalkulatorCOD" style="display:none; background:rgba(0,0,0,0.3); padding:10px; border-radius:10px; margin-bottom:10px;">
                <p>Tagihan: <b id="tagihanCalc">0</b></p>
                <input type="number" id="uangDiterima" class="modal-input" placeholder="Uang diterima..." oninput="hitungKembalian()">
                <p id="teksKembalian">Kembalian: Rp 0</p>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <button class="btn-main" style="background:#444; color:white;" onclick="batalUploadSelesai()">BATAL</button>
                <button id="btnUploadFoto" class="btn-main" onclick="eksekusiUploadSelesai()">UPLOAD</button>
            </div>
        </div>
    </div>

    <div id="ejAlertOverlay" class="modal-overlay" style="justify-content:center; padding:20px; z-index:9999999;">
        <div class="glass-card" style="width:100%; max-width:320px; text-align:center; border-color:var(--gold);" id="ejAlertBox">
            <div id="ejAlertIcon" style="font-size:40px; margin-bottom:15px;"></div>
            <h2 id="ejAlertTitle"></h2>
            <p id="ejAlertText" style="margin: 10px 0 20px 0; font-size: 12px; color: #ccc;"></p>
            <button class="btn-main" onclick="tutupEjAlert()">OK</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCP6q75dxdWmsvXlAU-ON0KyvzqGXeCaUg", authDomain: "ejtobacco-v2.firebaseapp.com", databaseURL: "https://ejtobacco-v2-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "ejtobacco-v2", storageBucket: "ejtobacco-v2.firebasestorage.app", messagingSenderId: "366973371317", appId: "1:366973371317:web:c5ec32460cd9cf0f6c8ffc" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myName = localStorage.getItem('namaKurir') || "";
        let currentTab = 'Proses', allData = [], allPengeluaranData = {}, allSetoranData = {}, memoriPIN = "";
        const dataPIN = { "kurirA": "1111", "kurirB": "2222", "kurirC": "3333" };

        // --- KTP SATPAM (HARUS DI ATAS) ---
        firebase.auth().signInWithEmailAndPassword("tokoej2020@gmail.com", "ejtbk2020")
        .then(() => {
            console.log("KTP KURIR DITERIMA!");
            if (myName) {
                document.getElementById('loginOverlay').style.display = 'none';
                initDataRealtime();
                aktifkanRadar();
            }
        });

        function initDataRealtime() {
            db.ref('pesanan').on('value', snap => {
                allData = snap.val() ? Object.keys(snap.val()).map(k => ({id:k, ...snap.val()[k]})).reverse() : [];
                updateUI();
            });
            db.ref('pengeluaran').on('value', snap => { allPengeluaranData = snap.val() || {}; updateUI(); });
            db.ref('setoran_kurir').on('value', snap => { allSetoranData = snap.val() || {}; updateUI(); });
        }

        function updateUI() {
            const today = getTgl(); let gd=0, p=0, s=0, g=0, codK=0; const me = myName.toLowerCase();
            allData.forEach(o => {
                if (o.status === 'Gudang') gd++;
                if (String(o.kurir || "").toLowerCase() === me) {
                    if (o.status === 'Proses' || o.status === 'Tunda') p++;
                    else if (o.status === 'Terkirim' && o.tanggal === today) { s++; if(o.metode==='COD') codK += Number(o.total || 0); }
                    else if (o.status === 'Gagal' && o.tanggal === today) g++;
                }
            });
            document.getElementById('c-Gudang').innerText=gd; document.getElementById('c-Proses').innerText=p; document.getElementById('c-Terkirim').innerText=s; document.getElementById('c-Gagal').innerText=g;
            document.getElementById('totalCOD').innerText="Rp "+codK.toLocaleString('id-ID');
            renderOrders();
        }

        function renderOrders() {
            const container = document.getElementById('orderContainer');
            const search = document.getElementById('searchOrder').value.toLowerCase();
            const today = getTgl(); const me = myName.toLowerCase();
            container.innerHTML = "";

            let filtered = allData.filter(o => {
                const match = (o.namaPembeli || "").toLowerCase().includes(search);
                if (currentTab === 'Gudang') return match && o.status === 'Gudang';
                if (String(o.kurir || "").toLowerCase() !== me) return false;
                if (currentTab === 'Proses') return match && (o.status === 'Proses' || o.status === 'Tunda');
                return match && (o.status === currentTab && o.tanggal === today);
            });

            filtered.forEach(o => {
                container.innerHTML += `
                <div class="glass-card">
                    <b>${o.namaPembeli}</b><br><small>${o.noPesanan}</small><br>
                    <p style="font-size:11px; margin:10px 0;">${o.alamat}</p>
                    <div class="order-badge ${o.status==='Gudang'?'badge-gudang':'badge-proses'}">${o.status}</div>
                    <div style="margin-top:10px;">
                        ${o.status === 'Gudang' ? `<button class="btn-main" onclick="ambilPaket('${o.id}')">AMBIL PAKET</button>` : 
                        `<button class="action-btn" style="background:var(--safe); width:100%;" onclick="bukaModalFoto('${o.id}', '${o.metode}', ${o.total})">SELESAI</button>`}
                    </div>
                    <input type="file" id="f-${o.id}" accept="image/*" capture="environment" style="display:none;" onchange="uploadSelesai('${o.id}', '${o.metode}', ${o.total}, this)">
                </div>`;
            });
        }

        // --- FUNGSI PENDUKUNG ---
        function pressPin(val) {
            if (val === 'C') memoriPIN = "";
            else if (val === 'OK') {
                if (memoriPIN === dataPIN[document.getElementById('namaKurirInput').value]) {
                    myName = document.getElementById('namaKurirInput').value;
                    localStorage.setItem('namaKurir', myName);
                    document.getElementById('loginOverlay').style.display='none';
                    initDataRealtime();
                } else { ejAlert("SALAH", "PIN Anda Salah!", "danger"); memoriPIN = ""; }
            } else { if(memoriPIN.length < 4) memoriPIN += val; }
            document.getElementById('pinDisplay').innerText = "*".repeat(memoriPIN.length) || "****";
        }

        function getTgl() { const n = new Date(); return `${String(n.getDate()).padStart(2,'0')}/${String(n.getMonth()+1).padStart(2,'0')}/${n.getFullYear()}`; }
        function setTab(t) { currentTab = t; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById('t-'+t).classList.add('active'); renderOrders(); }
        function ambilPaket(id) { db.ref('pesanan/'+id).update({ status:'Proses', kurir:myName }); }
        
        function ejAlert(judul, pesan, tipe) {
            document.getElementById('ejAlertTitle').innerText = judul;
            document.getElementById('ejAlertText').innerText = pesan;
            document.getElementById('ejAlertOverlay').style.display = 'flex';
            const icon = document.getElementById('ejAlertIcon');
            icon.innerHTML = tipe === 'danger' ? '<i class="fa-solid fa-circle-xmark" style="color:var(--danger)"></i>' : '<i class="fa-solid fa-circle-exclamation" style="color:var(--gold)"></i>';
        }
        function tutupEjAlert() { document.getElementById('ejAlertOverlay').style.display = 'none'; }
        function updateStatusInternet() {
            const teks = document.getElementById('teksKoneksi');
            if(navigator.onLine) { teks.innerText = "ONLINE"; teks.style.color = "var(--safe)"; prosesDataOffline(); }
            else { teks.innerText = "OFFLINE"; teks.style.color = "var(--offline)"; }
        }

        // --- OFFLINE LOGIC ---
        function prosesDataOffline() {
            let q = JSON.parse(localStorage.getItem('ejOfflineKurir') || '[]');
            if (q.length === 0) return;
            q.forEach(item => { db.ref('pesanan/'+item.id).update(item.data); });
            localStorage.removeItem('ejOfflineKurir');
            ejAlert("SUKSES", "Data offline berhasil disinkron!", "success");
        }

        function bukaModalFoto(id, metode, total) { tempIdSukses = id; tempMetodeSukses = metode; tempTotalSukses = total; document.getElementById(`f-${id}`).click(); }
        
        let tempIdSukses, tempMetodeSukses, tempTotalSukses, tempFileSukses;
        function uploadSelesai(id, metode, total, input) {
            tempFileSukses = input.files[0];
            if (metode === 'COD') {
                document.getElementById('modalPenerima').style.display = 'flex';
                document.getElementById('kalkulatorCOD').style.display = 'block';
                document.getElementById('tagihanCalc').innerText = total;
            } else {
                eksekusiUploadSelesai();
            }
        }

        function eksekusiUploadSelesai() {
            const dataUpdate = { status:'Terkirim', waktuSelesai:new Date().toLocaleTimeString(), kurir:myName, tanggal:getTgl() };
            if (!navigator.onLine) {
                let q = JSON.parse(localStorage.getItem('ejOfflineKurir') || '[]');
                q.push({ id: tempIdSukses, data: dataUpdate });
                localStorage.setItem('ejOfflineKurir', JSON.stringify(q));
                ejAlert("OFFLINE", "Disimpan di HP sementara", "warning");
                document.getElementById('modalPenerima').style.display='none';
                return;
            }
            db.ref('pesanan/'+tempIdSukses).update(dataUpdate).then(() => {
                document.getElementById('modalPenerima').style.display='none';
                ejAlert("BERHASIL", "Data terkirim ke pusat", "success");
            });
        }
        
        function aktifkanRadar() { if (navigator.geolocation) { navigator.geolocation.watchPosition(pos => { db.ref('tracking/'+myName).set({ lat: pos.coords.latitude, lng: pos.coords.longitude }); }); } }
    </script>
</body>
</html>
