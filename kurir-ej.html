<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJ KURIR - SINKRON</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(212, 175, 55, 0.2); --safe: #22C55E; --warning: #FACC15; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: #fff; padding: 15px; }
        .wallet { background: rgba(34, 197, 94, 0.1); border: 1px solid var(--safe); border-radius: 15px; padding: 15px; text-align: center; margin-bottom: 15px; }
        .tab-menu { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .tab-btn { background: var(--glass); border: 1px solid var(--glass-border); padding: 10px; border-radius: 12px; text-align: center; font-size: 10px; font-weight: 800; cursor: pointer; }
        .tab-btn.active { color: var(--gold); border-color: var(--gold); }
        .glass-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 18px; margin-bottom: 15px; }
        .btn { padding: 12px; border-radius: 10px; font-weight: 800; border: none; cursor: pointer; width: 100%; }
        .btn-wa { background: #25D366; color: white; margin-bottom: 8px; text-decoration: none; display: block; text-align: center; font-size: 12px; }
        .btn-success { background: var(--safe); color: white; }
        .btn-warning { background: var(--warning); color: black; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="wallet">
        <span style="color:var(--safe); font-size:10px; font-weight:800;">SISA UANG DI TANGAN</span>
        <b id="totalCOD" style="display:block; font-size:22px; color:var(--safe);">Rp0</b>
    </div>

    <div class="tab-menu">
        <div class="tab-btn active" id="t-Proses" onclick="setTab('Proses')">PROSES<br><span id="c-Proses">0</span></div>
        <div class="tab-btn" id="t-Terkirim" onclick="setTab('Terkirim')">SUKSES<br><span id="c-Terkirim">0</span></div>
        <div class="tab-btn" id="t-Gagal" onclick="setTab('Gagal')">CANCEL<br><span id="c-Gagal">0</span></div>
    </div>

    <div id="orderList">Memuat...</div>

    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAVQGysGRlYJ2b4PekM3vaXKtx6UFvNlCk", databaseURL: "https://ej-tobacco-express-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let allData = [], totalSetoran = 0, currentTab = 'Proses';

        const getTgl = () => { const n = new Date(); return `${String(n.getDate()).padStart(2,'0')}/${String(n.getMonth()+1).padStart(2,'0')}/${n.getFullYear()}`; };

        db.ref('pesanan').on('value', snap => {
            allData = snap.val() ? Object.keys(snap.val()).map(k => ({id:k, ...snap.val()[k]})).reverse() : [];
            updateStats();
        });
        db.ref('setoran').on('value', snap => {
            totalSetoran = Object.values(snap.val() || {}).reduce((a, b) => a + b, 0);
            updateStats();
        });

        function updateStats() {
            const today = getTgl();
            let p=0, s=0, g=0, codTotal=0;
            allData.forEach(o => {
                if (o.status === 'Terkirim' && o.metode === 'COD') codTotal += Number(o.total || 0);
                if (o.status !== 'Terkirim' && o.status !== 'Gagal') p++;
                else if (o.status === 'Terkirim' && o.tanggal === today) s++;
                else if (o.status === 'Gagal' && o.tanggal === today) g++;
            });
            document.getElementById('totalCOD').innerText = "Rp" + (codTotal - totalSetoran).toLocaleString();
            document.getElementById('c-Proses').innerText = p;
            document.getElementById('c-Terkirim').innerText = s;
            document.getElementById('c-Gagal').innerText = g;
            render();
        }

        function render() {
            const container = document.getElementById('orderList');
            const today = getTgl();
            const filtered = allData.filter(o => {
                if (currentTab === 'Proses') return (o.status !== 'Terkirim' && o.status !== 'Gagal');
                return o.status === currentTab && o.tanggal === today;
            });
            container.innerHTML = filtered.length ? "" : "Kosong";
            filtered.forEach(o => {
                const wa = String(o.nohp).replace(/\D/g, '').replace(/^0/, '62');
                container.innerHTML += `
                    <div class="glass-card">
                        <b>${o.namaPembeli}</b><br><small>${o.alamat}</small><br>
                        <b style="color:var(--safe)">Rp${Number(o.total).toLocaleString()} (${o.metode})</b>
                        <div style="margin-top:10px;">
                            <a href="https://wa.me/${wa}" class="btn btn-wa">HUBUNGI WA</a>
                            ${o.status !== 'Terkirim' && o.status !== 'Gagal' ? `
                                <button class="btn btn-success" onclick="done('${o.id}')">KONFIRMASI SUKSES</button>
                                <button class="btn btn-warning" onclick="tunda('${o.id}')">TUNDA / KENDALA</button>
                            ` : ''}
                        </div>
                    </div>`;
            });
        }

        function done(id) { if(confirm("Sukses?")) db.ref('pesanan/'+id).update({status:'Terkirim', alasanTunda:null}); }
        function tunda(id) { const a = prompt("Alasan?"); if(a) db.ref('pesanan/'+id).update({status:'Tunda', alasanTunda:a}); }
        function setTab(t) { currentTab=t; document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.getElementById('t-'+t).classList.add('active'); render(); }
    </script>
</body>
</html>
