<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EJ ADMIN PRO - FULL SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --gold: #D4AF37; --bg: #050505; --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(212, 175, 55, 0.2); --text-main: #FFFFFF; --safe: #22C55E; --danger: #EF4444; --blue: #2563eb; --wa: #25D366; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text-main); padding: 12px; }
        input, textarea, select { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 12px; padding: 12px; color: white; margin-bottom: 10px; outline: none; font-size: 14px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; }
        .main-logo-text { color: var(--gold); font-weight: 800; font-size: 20px; letter-spacing: 1px; }
        .report-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; margin-bottom: 12px; }
        .report-box { background: var(--glass); border: 1px solid var(--glass-border); padding: 10px 5px; border-radius: 12px; text-align: center; cursor: pointer; font-size: 11px; }
        .report-box b { display: block; font-size: 14px; margin-top: 4px; }
        .report-box.active { background: rgba(212, 175, 55, 0.15); border-color: var(--gold); }
        .glass-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        .btn-main { background: linear-gradient(135deg, #F7E08C, #D4AF37); color: #000; border: none; padding: 14px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; font-size: 14px; margin-top: 5px; }
        .btn-auto { background: var(--blue); color: white; border: none; border-radius: 10px; padding: 0 15px; font-weight: 800; font-size: 10px; cursor: pointer; white-space: nowrap; }
        .order-item { border-bottom: 1px solid rgba(255,255,255,0.1); padding: 15px 0; }
        .modal-foto { display: none; position: fixed; z-index: 99999; left: 0; top: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        #loginOverlay { position: fixed; inset: 0; background: #000; z-index: 999999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .num-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(212, 175, 55, 0.2); color: #fff; width: 70px; height: 70px; border-radius: 50%; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <h2 style="color:#fff;">EJ ADMIN</h2>
        <div id="pinDisplay" style="font-size: 40px; color: var(--gold); margin: 30px 0;">****</div>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px;">
            <button class="num-btn" onclick="pressPin('1')">1</button><button class="num-btn" onclick="pressPin('2')">2</button><button class="num-btn" onclick="pressPin('3')">3</button>
            <button class="num-btn" onclick="pressPin('4')">4</button><button class="num-btn" onclick="pressPin('5')">5</button><button class="num-btn" onclick="pressPin('6')">6</button>
            <button class="num-btn" onclick="pressPin('7')">7</button><button class="num-btn" onclick="pressPin('8')">8</button><button class="num-btn" onclick="pressPin('9')">9</button>
            <button class="num-btn" onclick="pressPin('C')" style="color:var(--danger)">C</button><button class="num-btn" onclick="pressPin('0')">0</button><button class="num-btn" onclick="pressPin('OK')" style="color:var(--safe)">OK</button>
        </div>
    </div>
    
    <div class="header">
        <div class="main-logo-text">EJ TOBACCO</div>
        <div id="clock" style="font-size: 12px; color: var(--safe);">00:00:00</div>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px;">
        <button onclick="bukaLaporan()" style="background:var(--glass); border:1px solid var(--gold); color:var(--gold); padding:10px; border-radius:12px; font-weight:800; font-size:10px;">📊 LAPORAN</button>
        <button onclick="bukaRadar()" style="background:var(--glass); border:1px solid var(--blue); color:var(--blue); padding:10px; border-radius:12px; font-weight:800; font-size:10px;">📡 RADAR PELANGGAN</button>
    </div>
    
    <div class="report-grid">
        <div class="report-box active" id="f-Semua" onclick="setFilter('Semua')"><span>Jalan</span><b id="countProses">0</b></div>
        <div class="report-box" id="f-Gudang" onclick="setFilter('Gudang')"><span>Gudang</span><b id="countGudang">0</b></div>
        <div class="report-box" id="f-Terkirim" onclick="setFilter('Terkirim')"><span>Sukses</span><b id="countSukses">0</b></div>
        <div class="report-box" id="f-Gagal" onclick="setFilter('Gagal')"><span>Cancel</span><b id="countGagal">0</b></div>
    </div>

    <div class="glass-card">
        <input type="text" id="pembeli" placeholder="Nama Pembeli" autocomplete="off">
        <input type="text" id="nohp" placeholder="WhatsApp (08xx)" autocomplete="off">
        <textarea id="alamat" placeholder="Alamat Lengkap (Patokan rumah)"></textarea>
        
        <label style="font-size:10px; color:var(--gold); margin-bottom:5px; display:block;">📍 LOKASI PETA</label>
        <div style="display: flex; gap: 5px; margin-bottom: 5px;">
            <input type="text" id="mapLink" placeholder="Tempel Link di sini..." style="margin:0; flex:1;" oninput="cekValiditasMap()">
            <button onclick="autoGenerateKoor()" id="btnAuto" class="btn-auto">⚡ AUTO-GENERATE</button>
        </div>
        <div id="mapStatus" style="font-size:10px; color:var(--danger); margin-bottom:10px;">⚠️ Radar Belum Aktif</div>

        <select id="metodeBayar" onchange="toggleTotal()">
            <option value="COD">Metode: COD (Bayar di Tempat)</option>
            <option value="Transfer">Metode: Transfer</option>
        </select>
        <input type="number" id="total" placeholder="Harga COD (Rp)">
        
        <button class="btn-main" onclick="tambah()">SIMPAN & PRINT</button>
    </div>

    <input type="text" id="searchBar" placeholder="🔍 Cari nama/resi..." oninput="renderList()" style="width:100%;">
    <div id="adminList" class="glass-card">Memuat data...</div>

    <div id="laporanOverlay" class="modal-foto"><div class="glass-card" style="width:90%; background:#000;"><div id="isiLaporan"></div><button class="btn-main" onclick="this.parentElement.parentElement.style.display='none'" style="margin-top:20px;">TUTUP</button></div></div>
    <div id="petaOverlay" class="modal-foto"><div id="mapRadar" style="width:95%; height:80%; border-radius:20px;"></div><button class="btn-main" onclick="this.parentElement.style.display='none'" style="margin-top:10px; width:95%;">TUTUP RADAR</button></div>
    <div id="modalFoto" class="modal-foto" onclick="this.style.display='none'"><img id="imgBukti" src=""></div>

    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAVQGysGRlYJ2b4PekM3vaXKtx6UFvNlCk", databaseURL: "https://ej-tobacco-express-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let allOrders = [], currentFilter = "Semua";

        // --- BUG FIX: SEMBUNYIKAN KOLOM COD KALAU TRANSFER ---
        function toggleTotal() {
            const val = document.getElementById('metodeBayar').value;
            const inputTotal = document.getElementById('total');
            if (val === 'Transfer') {
                inputTotal.style.display = 'none';
                inputTotal.value = ''; // Kosongkan nilainya
            } else {
                inputTotal.style.display = 'block';
            }
        }

        // --- MESIN BONGKAR LINK (AUTO GENERATE) ---
        async function autoGenerateKoor() {
            const input = document.getElementById('mapLink');
            const status = document.getElementById('mapStatus');
            const btn = document.getElementById('btnAuto');
            let url = input.value.trim();

            if(!url.includes("http")) return alert("Tempel link Maps-nya dulu, Bos!");

            btn.innerText = "⌛ BONGKAR...";
            status.innerText = "🔍 Mencari angka rahasia...";
            status.style.color = "var(--gold)";

            try {
                // Pakai API Unshorten untuk memanjangkan link goo.gl
                const apiUrl = "https://unshorten.me/json/" + encodeURIComponent(url);
                const response = await fetch(apiUrl);
                const data = await response.json();
                
                const linkPanjang = data.resolved_url || url;

                // Cari angka koordinat di link yang udah panjang
                const match = linkPanjang.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/) || 
                              linkPanjang.match(/(-?\d+\.\d+)\s*,\s*(-?\d+\.\d+)/) ||
                              linkPanjang.match(/ll=(-?\d+\.\d+),(-?\d+\.\d+)/) ||
                              linkPanjang.match(/q=(-?\d+\.\d+),(-?\d+\.\d+)/);

                if (match) {
                    input.value = `${match[1]}, ${match[2]}`; // Berubah jadi angka
                    status.innerText = "✅ RADAR AKTIF: Koordinat Siap!";
                    status.style.color = "var(--safe)";
                } else {
                    throw new Error("Gagal bongkar");
                }
            } catch (err) {
                status.innerText = "❌ GAGAL BONGKAR LINK.";
                status.style.color = "var(--danger)";
                alert("Waduh, Google Maps lagi pelit Bos!\n\nSOLUSI PASTI:\n1. Buka linknya dulu di browser HP/PC.\n2. Copy alamat yang udah jadi PANJANG di bar atas.\n3. Tempel ke sini lagi.");
            } finally {
                btn.innerText = "⚡ AUTO-GENERATE";
            }
        }

        function extractCoords(text) {
            if(!text) return null;
            const match = text.match(/(-?\d+\.\d+)\s*,\s*(-?\d+\.\d+)/) || text.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
            if (match) return { lat: parseFloat(match[1]), lng: parseFloat(match[2]) };
            return null;
        }

        function cekValiditasMap() {
            const input = document.getElementById('mapLink');
            const status = document.getElementById('mapStatus');
            const koor = extractCoords(input.value);
            if (koor) { status.innerText = "✅ RADAR AKTIF!"; status.style.color = "var(--safe)"; }
            else { status.innerText = "⚠️ Radar Belum Aktif: Tempel & Klik Generate"; status.style.color = "var(--danger)"; }
        }

        // --- LOGIN & JAM ---
        let inputPin = "";
        function pressPin(val) {
            if (val === 'C') inputPin = "";
            else if (val === 'OK') { if (inputPin === "1234") document.getElementById('loginOverlay').style.display='none'; else { alert("SALAH!"); inputPin=""; } }
            else { if (inputPin.length < 4) inputPin += val; }
            document.getElementById('pinDisplay').innerText = inputPin.length > 0 ? "*".repeat(inputPin.length) : "****";
        }
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID'); }, 1000);

        // --- DATABASE OPS ---
        db.ref('pesanan').limitToLast(500).on('value', snap => {
            const val = snap.val();
            allOrders = val ? Object.keys(val).map(k => ({id:k, ...val[k]})).reverse() : [];
            updateDashboard(); renderList();
        });

        function updateDashboard() {
            let gd=0, p=0, s=0, g=0;
            allOrders.forEach(o => {
                if (o.status === 'Gudang') gd++;
                else if (o.status === 'Proses' || o.status === 'Tunda') p++;
                else if (o.status === 'Terkirim') s++;
                else if (o.status === 'Gagal') g++;
            });
            document.getElementById('countGudang').innerText = gd;
            document.getElementById('countProses').innerText = p;
            document.getElementById('countSukses').innerText = s;
            document.getElementById('countGagal').innerText = g;
        }

        function renderList() {
            const search = document.getElementById('searchBar').value.toLowerCase();
            let html = "";
            allOrders.filter(o => {
                const matchStatus = currentFilter === 'Semua' ? (o.status !== 'Terkirim' && o.status !== 'Gagal' && o.status !== 'Gudang') : o.status === currentFilter;
                return matchStatus && ((o.namaPembeli||"").toLowerCase().includes(search) || (o.noPesanan||"").toLowerCase().includes(search));
            }).forEach(o => {
                html += `<div class="order-item">
                    <b>${o.noPesanan} - ${o.namaPembeli}</b><br>
                    <small>${o.status} | ${o.metode} | Rp${Number(o.total || 0).toLocaleString()}</small><br>
                    ${o.kurir ? `<span style="color:var(--blue); font-size:10px;">🛵 Oleh: ${o.kurir}</span>` : ''}
                    <div style="margin-top:10px;">
                        ${o.buktiFoto ? `<button onclick="viewFoto('${o.buktiFoto}')" style="background:var(--safe); border:none; color:white; padding:5px 10px; border-radius:5px; font-size:10px; cursor:pointer;">FOTO</button>` : ''}
                        <button onclick="hapus('${o.id}')" style="background:var(--danger); border:none; color:white; padding:5px 10px; border-radius:5px; font-size:10px; cursor:pointer;">HAPUS</button>
                    </div>
                </div>`;
            });
            document.getElementById('adminList').innerHTML = html;
        }

        function tambah() {
            const n = new Date();
            const d = {
                noPesanan: "#"+Date.now().toString().slice(-4),
                namaPembeli: document.getElementById('pembeli').value,
                nohp: document.getElementById('nohp').value,
                alamat: document.getElementById('alamat').value,
                mapLink: document.getElementById('mapLink').value,
                total: document.getElementById('total').value || 0,
                metode: document.getElementById('metodeBayar').value,
                status: 'Gudang', kurir: "",
                tanggal: `${String(n.getDate()).padStart(2,'0')}/${String(n.getMonth()+1).padStart(2,'0')}/${n.getFullYear()}`,
                waktu: n.toLocaleTimeString('id-ID')
            };
            if(!d.namaPembeli) return alert("Nama wajib diisi, Bos!");
            db.ref('pesanan').push(d).then(() => {
                alert("Sukses masuk Gudang!");
                ['pembeli','nohp','alamat','mapLink','total'].forEach(id => document.getElementById(id).value="");
                document.getElementById('metodeBayar').value = 'COD';
                toggleTotal(); // Reset ke tampilan COD
                cekValiditasMap();
            });
        }

        function viewFoto(src) { document.getElementById('imgBukti').src = src; document.getElementById('modalFoto').style.display='flex'; }
        function setFilter(f) { currentFilter = f; document.querySelectorAll('.report-box').forEach(el => el.classList.remove('active')); document.getElementById('f-'+f).classList.add('active'); renderList(); }
        function hapus(id) { if(confirm("Hapus pesanan ini?")) db.ref('pesanan/'+id).remove(); }

        let radarMap;
        function bukaRadar() {
            document.getElementById('petaOverlay').style.display = 'flex';
            if (radarMap) radarMap.remove();
            radarMap = L.map('mapRadar').setView([-6.87, 109.03], 12);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(radarMap);
            allOrders.forEach(o => {
                if (o.status !== 'Terkirim' && o.status !== 'Gagal' && o.status !== 'Gudang' && o.mapLink) {
                    const k = extractCoords(o.mapLink);
                    if (k) L.marker([k.lat, k.lng]).addTo(radarMap).bindPopup(`<b>${o.namaPembeli}</b><br>Kurir: ${o.kurir}`);
                }
            });
            setTimeout(() => radarMap.invalidateSize(), 500);
        }

        function bukaLaporan() {
            document.getElementById('laporanOverlay').style.display = 'flex';
            let total = 0, sukses = 0;
            allOrders.forEach(o => { if(o.status === 'Terkirim') { sukses++; total += Number(o.total || 0); } });
            document.getElementById('isiLaporan').innerHTML = `<h2 style="color:var(--gold); text-align:center;">RINGKASAN</h2><p>Pesanan Berhasil: <b>${sukses}</b></p><p>Total Uang COD: <b>Rp ${total.toLocaleString()}</b></p>`;
        }
    </script>
</body>
</html>
