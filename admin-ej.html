<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJ ADMIN PRO - LUXURY EDITION</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <link rel="icon" href="logo-baru.png" type="image/png">
    <link rel="apple-touch-icon" href="logo-baru.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(212, 175, 55, 0.2); --text-main: #FFFFFF; --safe: #22C55E; --danger: #EF4444; --blue: #2563eb; --wa: #25D366; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text-main); padding: 15px; padding-bottom: 50px; }
        
        /* EFEK MEWAH BERDENYUT */
        @keyframes denyutEmas {
            0% { box-shadow: 0 0 5px rgba(212, 175, 55, 0.2); transform: scale(1); }
            50% { box-shadow: 0 0 20px rgba(212, 175, 55, 0.5); transform: scale(1.01); }
            100% { box-shadow: 0 0 5px rgba(212, 175, 55, 0.2); transform: scale(1); }
        }
        .glow-btn { animation: denyutEmas 2s infinite ease-in-out; border: 1px solid var(--gold) !important; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .logo-text-container { display: flex; flex-direction: column; gap: 2px; }
        .main-logo-text { color: var(--gold); font-weight: 800; font-size: 20px; letter-spacing: 1px; text-transform: uppercase; }
        .sub-logo-text { color: var(--text-main); font-weight: 400; font-size: 11px; opacity: 0.8; letter-spacing: 2px; text-transform: uppercase; }

        .report-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .report-box { background: var(--glass); border: 1px solid var(--glass-border); padding: 12px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; }
        .report-box.active { background: rgba(212, 175, 55, 0.15); border-color: var(--gold); }
        .report-box span { font-size: 7px; font-weight: 800; color: var(--gold); text-transform: uppercase; }
        .report-box b { display: block; font-size: 14px; margin-top: 4px; }

        .glass-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        input, textarea, select { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 12px; padding: 12px; color: white; margin-bottom: 10px; outline: none; }
        .btn-main { background: linear-gradient(135deg, #F7E08C, #D4AF37); color: #000; border: none; padding: 14px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; }
        
        .order-item { border-bottom: 1px solid rgba(255,255,255,0.1); padding: 15px 0; }
        .btn-small { padding: 10px; border-radius: 8px; font-weight: 800; font-size: 10px; text-align: center; color: white; border: none; cursor: pointer; }
        
        .modal-foto { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; flex-direction: column; justify-content: center; align-items: center; }
        .modal-foto img { max-width: 90%; max-height: 70%; border: 2px solid var(--gold); border-radius: 15px; }
        
        #loginOverlay { position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .pin-container { text-align: center; width: 100%; max-width: 320px; padding: 20px; }
        .pin-display { font-size: 35px; letter-spacing: 12px; margin: 30px 0; color: var(--gold); font-weight: 700; }
        .numpad { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; width: 100%; }
        .num-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,215,0,0.1); color: #fff; width: 75px; height: 75px; border-radius: 50%; font-size: 24px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .num-btn:active { background: var(--gold); color: #000; transform: scale(0.9); }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="pin-container">
            <div style="margin-bottom: 20px;">
                <h2 style="color:#fff; font-size:22px;">EJ ACCESS</h2>
                <p style="color:var(--gold); font-size:11px; letter-spacing:2px; opacity:0.6;">SECURITY VERIFICATION</p>
            </div>
            <div class="pin-display" id="pinDisplay">****</div>
            <div class="numpad">
                <button class="num-btn" onclick="pressPin('1'); navigator.vibrate(15);">1</button>
                <button class="num-btn" onclick="pressPin('2'); navigator.vibrate(15);">2</button>
                <button class="num-btn" onclick="pressPin('3'); navigator.vibrate(15);">3</button>
                <button class="num-btn" onclick="pressPin('4'); navigator.vibrate(15);">4</button>
                <button class="num-btn" onclick="pressPin('5'); navigator.vibrate(15);">5</button>
                <button class="num-btn" onclick="pressPin('6'); navigator.vibrate(15);">6</button>
                <button class="num-btn" onclick="pressPin('7'); navigator.vibrate(15);">7</button>
                <button class="num-btn" onclick="pressPin('8'); navigator.vibrate(15);">8</button>
                <button class="num-btn" onclick="pressPin('9'); navigator.vibrate(15);">9</button>
                <button class="num-btn" onclick="pressPin('C'); navigator.vibrate(30);" style="color:var(--danger)">C</button>
                <button class="num-btn" onclick="pressPin('0'); navigator.vibrate(15);">0</button>
                <button class="num-btn" onclick="pressPin('OK'); navigator.vibrate(50);" style="color:var(--safe)">OK</button>
            </div>
        </div>
    </div>
    
    <div class="header">
        <div class="logo-text-container">
            <div class="main-logo-text">EJ TOBACCO</div>
            <div class="sub-logo-text">DELIVERY</div>
        </div>

        <div style="text-align: right;">
            <div id="statusKoneksi" style="display: flex; align-items: center; gap: 5px; justify-content: flex-end; margin-bottom: 5px;">
                <div id="lampuKoneksi" style="width: 8px; height: 8px; background: var(--safe); border-radius: 50%; box-shadow: 0 0 10px var(--safe);"></div>
                <span id="teksKoneksi" style="font-size: 9px; font-weight: 800; color: var(--safe);">SISTEM ONLINE</span>
            </div>
            <div id="runningClock" style="font-size: 14px; font-weight: 800; color: var(--safe);">00:00:00</div>
            <div id="currentDay" style="font-size: 9px; color: var(--gold); font-weight: 800;">TGL LOADING...</div>
        </div>
    </div>

    <div style="display: flex; gap: 5px; margin-bottom: 15px;">
        <input type="date" id="datePicker" onchange="changeDate()" style="border-color: var(--gold); background: rgba(212, 175, 55, 0.1); color: var(--gold); text-align: center; font-weight: 800; flex: 1;">
        <button onclick="goToToday(); navigator.vibrate(20);" style="background: var(--gold); border: none; border-radius: 12px; padding: 0 15px; font-weight: 800; font-size: 10px; color: black; cursor: pointer;">HARI INI</button>
    </div>

    <div style="padding: 5px 0 15px 0;">
        <button onclick="bukaLaporan(); navigator.vibrate(20);" class="glow-btn" style="background: rgba(212, 175, 55, 0.05); border: 1px solid rgba(212, 175, 55, 0.3); color: var(--gold); padding: 16px; border-radius: 20px; font-weight: 800; font-size: 11px; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 12px; letter-spacing: 1px;">
            <span style="font-size: 18px;">📊</span> LIHAT REKAPITULASI BULANAN
        </button>
    </div>

    <div style="padding: 0 0 15px 0;">
        <button onclick="bukaRadar(); navigator.vibrate(20);" class="glow-btn" style="background: rgba(37, 99, 235, 0.1); border: 1px solid var(--blue); color: var(--blue); padding: 16px; border-radius: 20px; font-weight: 800; font-size: 11px; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 12px; letter-spacing: 1px;">
            <span style="font-size: 18px;">📡</span> BUKA RADAR SEBARAN PELANGGAN
        </button>
    </div>
    
    <div class="report-grid">
        <div class="report-box active" id="f-Semua" onclick="setFilter('Semua')"><span>Sisa</span><b id="countProses">0</b></div>
        <div class="report-box" id="f-Terkirim" onclick="setFilter('Terkirim')" style="border-color: var(--safe);"><span>Sukses</span><b id="countSukses">0</b></div>
        <div class="report-box" id="f-Gagal" onclick="setFilter('Gagal')" style="border-color: var(--danger);"><span>Cancel</span><b id="countGagal">0</b></div>
    </div>

    <div class="report-box" style="margin-bottom: 20px; border-color: var(--safe); background: rgba(34, 197, 94, 0.05); cursor: default;">
        <span style="color: var(--safe); font-size: 10px; font-weight: 800;">TOTAL SALDO DI KURIR</span>
        <b id="dailyTunai" style="font-size: 20px; color: var(--safe);">Rp0</b>
    </div>

    <div class="glass-card">
        <input type="text" id="noPesanan" placeholder="No Pesanan (#001)">
        <input type="text" id="pembeli" placeholder="Nama Pembeli">
        <input type="text" id="nohp" placeholder="WhatsApp (08xx)">
        <textarea id="alamat" placeholder="Alamat Lengkap"></textarea>
        <input type="text" id="mapLink" placeholder="Link Google Maps (Opsional)">
        <select id="metodeBayar" onchange="toggleTotal()"><option value="COD">Metode: COD</option><option value="Transfer">Metode: Transfer</option></select>
        <input type="number" id="total" placeholder="Harga COD (Rp)">
        <button class="btn-main" onclick="tambah(); navigator.vibrate(40);">SIMPAN & PRINT</button>
    </div>

    <div class="glass-card">
        <input type="number" id="jumlahSetoran" placeholder="Input Setoran (Rp)">
        <button class="btn-main" style="background:var(--safe); color:white" onclick="setor(); navigator.vibrate(40);">TERIMA SETORAN</button>
    </div>

    <input type="text" id="searchBar" placeholder="🔍 Cari nama/resi..." oninput="renderList()" style="width:100%; padding:12px; border-radius:12px; background:var(--glass); border:1px solid var(--gold); color:white; margin-bottom:15px; outline:none;">
    
    <div id="adminList" class="glass-card">Memuat data...</div>

    <div id="modalFoto" class="modal-foto" onclick="this.style.display='none'"><img id="imgBukti" src=""></div>
    <div id="waPrompt"><p id="waText">✅ Data Tersimpan!</p><button id="btnWAOpen">KIRIM WA SEKARANG</button></div>
    <div id="petaOverlay" class="modal-foto" style="backdrop-filter: blur(10px);">
        <div style="background: #000; width: 100%; height: 85%; border-radius: 25px; overflow: hidden; position: relative; border: 2px solid var(--gold);">
            <div id="mapRadar" style="width: 100%; height: 100%;"></div>
            <button onclick="document.getElementById('petaOverlay').style.display='none'" style="position: absolute; top: 15px; right: 15px; background: var(--danger); color: white; border: none; padding: 12px 20px; border-radius: 12px; font-weight: 800; z-index: 10001;">TUTUP</button>
        </div>
    </div>
    <div id="laporanOverlay" class="modal-foto" style="backdrop-filter: blur(15px);">
        <div class="glass-card" style="width: 100%; max-width: 450px; border: 1px solid var(--gold); background: #0A0A0A;">
            <h2 style="color: var(--gold); text-align: center; margin-bottom: 25px; font-weight: 800;">REKAPITULASI</h2>
            <div id="isiLaporan" style="line-height: 2.5; font-size: 14px;"></div>
            <button class="btn-main" onclick="document.getElementById('laporanOverlay').style.display='none'" style="margin-top: 30px;">TUTUP</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-database-compat.js"></script>
    <script>
        // CONFIG & DB
        const firebaseConfig = { apiKey: "AIzaSyAVQGysGRlYJ2b4PekM3vaXKtx6UFvNlCk", databaseURL: "https://ej-tobacco-express-default-rtdb.asia-southeast1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let allOrders = [], totalSetoranGlobal = 0, currentFilter = "Semua", lastOrder = null;

        // ANIMASI ANGKA JALAN
        function animateValue(id, start, end, duration) {
            if (start === end) return;
            let range = end - start;
            let current = start;
            let increment = end > start ? Math.ceil(range / 20) : Math.floor(range / 20);
            let obj = document.getElementById(id);
            let timer = setInterval(function() {
                current += increment;
                if ((increment > 0 && current >= end) || (increment < 0 && current <= end)) {
                    current = end;
                    clearInterval(timer);
                }
                obj.innerText = "Rp" + current.toLocaleString();
            }, 30);
        }

        let lastSaldoValue = 0;
        function updateDashboard(tglTarget) {
            let s=0, g=0, p=0, codSukses=0;
            allOrders.forEach(o => {
                if (o.tanggal === tglTarget) {
                    if (o.status === 'Terkirim') s++;
                    else if (o.status === 'Gagal') g++;
                }
                if (o.status !== 'Terkirim' && o.status !== 'Gagal') p++;
                if (o.status === 'Terkirim' && o.metode === 'COD') codSukses += Number(o.total || 0);
            });
            document.getElementById('countSukses').innerText = s;
            document.getElementById('countGagal').innerText = g;
            document.getElementById('countProses').innerText = p;
            
            let currentSaldo = codSukses - totalSetoranGlobal;
            animateValue("dailyTunai", lastSaldoValue, currentSaldo, 1000);
            lastSaldoValue = currentSaldo;
        }

        // --- SISTEM LOGIN PIN ---
        let inputPin = "";
        const PIN_RAHASIA = "1234";
        function pressPin(val) {
            if (val === 'C') { inputPin = ""; } 
            else if (val === 'OK') {
                if (inputPin === PIN_RAHASIA) { document.getElementById('loginOverlay').style.display = 'none'; } 
                else { alert("⚠️ PIN SALAH!"); inputPin = ""; }
            } else { if (inputPin.length < 4) inputPin += val; }
            document.getElementById('pinDisplay').innerText = inputPin.length > 0 ? "*".repeat(inputPin.length) : "****";
        }

        // CORE FUNCTIONS (Same as yours, but kept for integration)
        function formatTglDB(date) { const d = new Date(date); return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`; }
        function initDate() { const n = new Date(); document.getElementById('datePicker').value = `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`; }
        initDate();
        function changeDate() { updateAll(); }
        function goToToday() { initDate(); updateAll(); }
        function setFilter(f) { currentFilter = f; document.querySelectorAll('.report-box').forEach(el => el.classList.remove('active')); document.getElementById('f-'+f).classList.add('active'); updateAll(); }

        db.ref('pesanan').on('value', snap => {
            const val = snap.val();
            allOrders = val ? Object.keys(val).map(k => ({id:k, ...val[k]})).reverse() : [];
            db.ref('setoran').on('value', sSnap => {
                totalSetoranGlobal = Object.values(sSnap.val() || {}).reduce((a, b) => a + b, 0);
                updateAll();
            });
        });

        function updateAll() {
            const pickerVal = document.getElementById('datePicker').value;
            if(!pickerVal) return;
            const p = pickerVal.split('-');
            const tglTarget = `${p[2]}/${p[1]}/${p[0]}`;
            updateDashboard(tglTarget);
            renderList(tglTarget);
        }

        function renderList(tglTarget) {
            const keyword = document.getElementById('searchBar').value.toLowerCase();
            let html = "";
            const filtered = allOrders.filter(o => {
                const matchSearch = (o.namaPembeli || "").toLowerCase().includes(keyword) || (o.noPesanan || "").toLowerCase().includes(keyword);
                let matchStatus = (currentFilter === "Semua") ? (o.status !== 'Terkirim' && o.status !== 'Gagal') : (o.status === currentFilter && o.tanggal === tglTarget);
                return matchSearch && matchStatus;
            });
            filtered.forEach(o => {
                const waNum = String(o.nohp || "").replace(/\D/g, '').replace(/^0/, '62');
                html += `<div class="order-item">
                    <span style="font-size:9px; color:var(--gold)">${o.tanggal}</span><br>
                    <b>${o.noPesanan} - ${o.namaPembeli}</b><br>
                    <small>${o.status} | Rp${Number(o.total).toLocaleString()}</small>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:8px;">
                        <a href="https://wa.me/${waNum}" style="background:var(--wa); text-decoration:none; color:white; padding:8px; border-radius:8px; text-align:center; font-size:10px; font-weight:800;">WA</a>
                        <button style="background:var(--gold); color:black; border:none; padding:8px; border-radius:8px; font-size:10px; font-weight:800;" onclick="reprint('${o.id}')">PRINT</button>
                    </div>
                </div>`;
            });
            document.getElementById('adminList').innerHTML = html || `<p style="text-align:center; opacity:0.5; padding:20px;">Kosong</p>`;
        }

        function tambah() {
            const n = new Date();
            const d = { 
                noPesanan: document.getElementById('noPesanan').value || "#"+Date.now().toString().slice(-4), 
                namaPembeli: document.getElementById('pembeli').value, 
                nohp: document.getElementById('nohp').value, 
                alamat: document.getElementById('alamat').value, 
                mapLink: document.getElementById('mapLink').value, 
                total: document.getElementById('total').value || 0, 
                metode: document.getElementById('metodeBayar').value, 
                status: 'Menunggu', 
                tanggal: formatTglDB(n), 
                waktu: n.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}) 
            };
            if(!d.namaPembeli) return alert("Nama wajib!");
            db.ref('pesanan').push(d).then(() => { document.querySelectorAll('.glass-card input, .glass-card textarea').forEach(i => i.value = ""); });
        }

        function setor() { 
            const j = Number(document.getElementById('jumlahSetoran').value); 
            const dK = formatTglDB(new Date()).replace(/\//g, '-');
            db.ref('setoran/' + dK).transaction(cv => (cv || 0) + j).then(() => { 
                document.getElementById('jumlahSetoran').value = ""; 
                alert("💰 SETORAN DITERIMA!"); 
            }); 
        }

        // --- RADAR & KONEKSI ---
        function bukaRadar() {
            document.getElementById('petaOverlay').style.display = 'flex';
            const map = new google.maps.Map(document.getElementById("mapRadar"), {
                zoom: 12, center: { lat: -6.87, lng: 109.03 },
                styles: [{ "elementType": "geometry", "stylers": [{ "color": "#212121" }] }, { "elementType": "labels.text.fill", "stylers": [{ "color": "#757575" }] }]
            });
            allOrders.forEach(o => {
                if (o.status === 'Terkirim' && o.mapLink) {
                    let coords = extractCoords(o.mapLink);
                    if (coords) new google.maps.Marker({ position: coords, map: map, icon: { path: google.maps.SymbolPath.CIRCLE, fillColor: '#D4AF37', fillOpacity: 0.8, scale: 7, strokeColor: '#FFF', strokeWeight: 1 } });
                }
            });
        }

        function extractCoords(url) {
            try {
                const reg = /@(-?\d+\.\d+),(-?\d+\.\d+)/;
                const match = url.match(reg);
                if (match) return { lat: parseFloat(match[1]), lng: parseFloat(match[2]) };
                if (url.includes('q=')) { const p = url.split('q=')[1].split('&')[0].split(','); return { lat: parseFloat(p[0]), lng: parseFloat(p[1]) }; }
            } catch(e) { return null; }
        }

        window.addEventListener('online', updateStatusInternet);
        window.addEventListener('offline', updateStatusInternet);
        function updateStatusInternet() {
            const lampu = document.getElementById('lampuKoneksi');
            const teks = document.getElementById('teksKoneksi');
            if (navigator.onLine) {
                lampu.style.background = "var(--safe)"; lampu.style.boxShadow = "0 0 10px var(--safe)";
                teks.innerText = "SISTEM ONLINE"; teks.style.color = "var(--safe)";
            } else {
                lampu.style.background = "var(--danger)"; lampu.style.boxShadow = "0 0 10px var(--danger)";
                teks.innerText = "TERPUTUS"; teks.style.color = "var(--danger)";
                if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
            }
        }

        setInterval(() => { document.getElementById('runningClock').innerText = new Date().toLocaleTimeString('id-ID'); }, 1000);
    </script>
</body>
</html>
