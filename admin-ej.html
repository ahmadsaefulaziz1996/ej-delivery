<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EJ ADMIN PRO - FULL SYSTEM</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; --glass: rgba(255, 255, 255, 0.03); --glass-border: rgba(212, 175, 55, 0.2); --text-main: #FFFFFF; --safe: #22C55E; --warning: #F59E0B; --danger: #EF4444; --blue: #2563eb; --wa: #25D366; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-main); padding: 12px; overflow-x: hidden; user-select: none; }
        input, textarea, select { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 12px; padding: 12px; color: white; margin-bottom: 10px; outline: none; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; position: sticky; top: 0; z-index: 9999; background: var(--bg); padding: 10px 0; border-bottom: 1px solid var(--glass-border); }
        .main-logo-text { color: var(--gold); font-weight: 800; font-size: 20px; text-transform: uppercase; animation: goldBreathe 3s ease-in-out infinite; }
        @keyframes goldBreathe { 0%, 100% { opacity: 1; text-shadow: 0 0 5px var(--gold); } 50% { opacity: 0.7; text-shadow: 0 0 20px var(--gold); } }
        .report-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; margin-bottom: 12px; }
        .report-box { background: var(--glass); border: 1px solid var(--glass-border); padding: 10px 5px; border-radius: 12px; text-align: center; cursor: pointer; font-size: 11px; }
        .report-box.active { background: rgba(212, 175, 55, 0.15); border-color: var(--gold); }
        .glass-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        .btn-main { background: linear-gradient(135deg, #F7E08C, #D4AF37); color: #000; border: none; padding: 14px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; }
        .modal-foto { display: none; position: fixed; z-index: 1000000; inset: 0; background: rgba(0,0,0,0.9); flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        #loginOverlay { position: fixed; inset: 0; background: #000; z-index: 999999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .pin-display { font-size: 40px; letter-spacing: 15px; margin: 30px 0; color: var(--gold); font-weight: 800; }
        .numpad { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        .num-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(212, 175, 55, 0.2); color: #fff; width: 70px; height: 70px; border-radius: 50%; font-size: 24px; font-weight: 600; }
        @keyframes blinkUrgent { 0%, 100% { border-color: var(--danger); } 50% { border-color: #fff; background: rgba(239, 68, 68, 0.2); } }
        .card-urgent { animation: blinkUrgent 0.8s infinite !important; border: 2px solid var(--danger) !important; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div style="text-align: center;">
            <h2 style="color:#fff;">EJ ACCESS</h2>
            <div class="pin-display" id="pinDisplay">****</div>
            <div class="numpad">
                <button class="num-btn" onclick="pressPin('1')">1</button><button class="num-btn" onclick="pressPin('2')">2</button><button class="num-btn" onclick="pressPin('3')">3</button>
                <button class="num-btn" onclick="pressPin('4')">4</button><button class="num-btn" onclick="pressPin('5')">5</button><button class="num-btn" onclick="pressPin('6')">6</button>
                <button class="num-btn" onclick="pressPin('7')">7</button><button class="num-btn" onclick="pressPin('8')">8</button><button class="num-btn" onclick="pressPin('9')">9</button>
                <button class="num-btn" onclick="pressPin('C')" style="color:var(--danger)">C</button><button class="num-btn" onclick="pressPin('0')">0</button><button class="num-btn" onclick="pressPin('OK')" style="color:var(--safe)">OK</button>
            </div>
        </div>
    </div>
    
    <div class="header">
        <div><div class="main-logo-text">EJ TOBACCO</div><div style="font-size:9px;">DELIVERY SYSTEM</div></div>
        <div style="text-align: right;">
            <div id="runningClock" style="font-size: 14px; font-weight: 800; color: var(--safe);">00:00:00</div>
            <div id="currentDay" style="font-size: 9px; color: var(--gold); font-weight: 800;">LOADING...</div>
            <div style="display: flex; align-items: center; gap: 5px; justify-content: flex-end; margin-top: 3px;">
                <div id="lampuKoneksi" style="width: 6px; height: 6px; background: var(--safe); border-radius: 50%;"></div>
                <span id="teksKoneksi" style="font-size: 8px; font-weight: 800;">ONLINE</span>
            </div>
        </div>
    </div>

    <div style="display: flex; gap: 5px; margin-bottom: 15px;">
        <input type="date" id="datePicker" onchange="changeDate()" style="border-color: var(--gold); background: rgba(212, 175, 55, 0.1); color: var(--gold); text-align: center; flex: 1; margin:0;">
        <button onclick="goToToday()" style="background: var(--gold); border: none; border-radius: 12px; padding: 0 15px; font-weight: 800; font-size: 10px;">HARI INI</button>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-bottom:15px;">
        <button onclick="bukaLaporan()" style="background:var(--glass); border:1px solid var(--gold); color:var(--gold); padding:10px; border-radius:12px; font-weight:800; font-size:9px;">📊 LAPORAN BULANAN</button>
        <button onclick="bukaRadar()" style="background:var(--glass); border:1px solid var(--blue); color:var(--blue); padding:10px; border-radius:12px; font-weight:800; font-size:9px;">📡 RADAR KURIR LIVE</button>
    </div>

    <div id="radarOverlay" class="modal-foto">
        <div style="width: 95%; height: 80vh; background: #000; border: 1px solid var(--blue); border-radius: 15px; display: flex; flex-direction: column;">
            <div style="background: var(--blue); padding: 15px; display: flex; justify-content: space-between;">
                <span>📡 RADAR KURIR</span>
                <button onclick="document.getElementById('radarOverlay').style.display='none'">TUTUP</button>
            </div>
            <div id="mapRadar" style="flex: 1;"></div>
        </div>
    </div>
    
    <div class="report-grid">
        <div class="report-box" id="f-Gudang" onclick="setFilter('Gudang')">Gudang<b id="countGudang" style="display:block;">0</b></div>
        <div class="report-box active" id="f-Semua" onclick="setFilter('Semua')">Tas Kurir<b id="countProses" style="display:block;">0</b></div>
        <div class="report-box" id="f-Terkirim" onclick="setFilter('Terkirim')">Sukses<b id="countSukses" style="display:block;">0</b></div>
        <div class="report-box" id="f-Gagal" onclick="setFilter('Gagal')">Gagal<b id="countGagal" style="display:block;">0</b></div>
    </div>

    <h3 style="font-size:11px; color:var(--gold); margin-bottom:10px;">💸 KEUANGAN PER KURIR HARI INI</h3>
    <div id="keuanganKurirContainer" style="display:flex; flex-direction:column; gap:10px; margin-bottom:20px;"></div>

    <div class="glass-card">
        <input type="text" id="noPesanan" placeholder="No Pesanan (#001)">
        <input type="text" id="pembeli" placeholder="Nama Pembeli">
        <input type="text" id="nohp" placeholder="WhatsApp">
        <textarea id="alamat" placeholder="Alamat"></textarea>
        <input type="text" id="mapLink" placeholder="Link Map">
        <select id="metodeBayar" onchange="toggleTotal()"><option value="COD">COD</option><option value="Transfer">Transfer</option></select>
        <input type="number" id="total" placeholder="Harga Rp">
        <label><input type="checkbox" id="isUrgent"> 🔥 PESANAN URGENT</label>
        <button class="btn-main" onclick="tambah()" style="margin-top:10px;">SIMPAN & PRINT</button>
    </div>

    <input type="text" id="searchBar" placeholder="🔍 Cari nama/resi..." oninput="renderList()" style="border:1px solid var(--gold);">
    <div id="adminList"></div>

    <div id="laporanOverlay" class="modal-foto" style="padding: 20px; overflow-y: auto;">
        <div class="glass-card" style="width: 100%; background: #0A0A0A; border: 1px solid var(--gold);">
            <h2 style="color: var(--gold); text-align: center;">REKAPITULASI</h2>
            <input type="month" id="bulanLaporan" onchange="hitungLaporan()">
            <div id="isiLaporan" style="font-size: 14px; line-height: 2;"></div>
            <button class="btn-main" onclick="document.getElementById('laporanOverlay').style.display='none'">TUTUP</button>
        </div>
    </div>

    <div id="waPrompt" style="position:fixed; bottom:20px; left:20px; right:20px; background:var(--wa); padding:20px; border-radius:20px; display:none; z-index:9999999;">
        <p>✅ Tersimpan! Kirim rincian ke pelanggan?</p>
        <button id="btnWAOpen" style="width:100%; padding:10px; margin-top:10px; background:#fff; color:#000; border-radius:10px; font-weight:800;">KIRIM WA</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyCP6q75dxdWmsvXlAU-ON0KyvzqGXeCaUg", authDomain: "ejtobacco-v2.firebaseapp.com", databaseURL: "https://ejtobacco-v2-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "ejtobacco-v2", storageBucket: "ejtobacco-v2.firebasestorage.app", messagingSenderId: "366973371317", appId: "1:366973371317:web:c5ec32460cd9cf0f6c8ffc" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let allOrders = [], semuaPengeluaran = {}, semuaSetoranKurir = {}, currentFilter = "Semua", lastOrder = null;

        function formatTglDB(date) { const d = new Date(date); return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`; }
        function initDate() { const n = new Date(); document.getElementById('datePicker').value = `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`; }
        initDate();

        setInterval(() => {
            const now = new Date();
            document.getElementById('runningClock').innerText = now.toLocaleTimeString('id-ID');
            document.getElementById('currentDay').innerText = now.toLocaleDateString('id-ID', {day:'numeric', month:'short', year:'numeric'}).toUpperCase();
        }, 1000);

        let inputPin = "";
        function pressPin(val) {
            if (val === 'C') inputPin = ""; 
            else if (val === 'OK') { if (inputPin === "1234") document.getElementById('loginOverlay').style.display = 'none'; else inputPin = ""; }
            else { if (inputPin.length < 4) inputPin += val; }
            document.getElementById('pinDisplay').innerText = inputPin.length > 0 ? "*".repeat(inputPin.length) : "****";
        }

        db.ref('pesanan').limitToLast(200).on('value', s => { allOrders = s.val() ? Object.keys(s.val()).map(k => ({id:k, ...s.val()[k]})).reverse() : []; updateAll(); });
        db.ref('pengeluaran').on('value', s => { semuaPengeluaran = s.val() || {}; updateAll(); });
        db.ref('setoran_kurir').on('value', s => { semuaSetoranKurir = s.val() || {}; updateAll(); });

        function updateAll() {
            const tgl = document.getElementById('datePicker').value.split('-').reverse().join('/');
            let gd=0, p=0, s=0, g=0, dataK = {};
            
            allOrders.forEach(o => {
                if (o.status === 'Gudang') gd++;
                if (o.status !== 'Terkirim' && o.status !== 'Gagal' && o.status !== 'Gudang') p++;
                if (o.tanggal === tgl) {
                    if (o.status === 'Terkirim') { s++; if(o.metode === 'COD' && o.kurir) { if(!dataK[o.kurir]) dataK[o.kurir] = {cod:0, keluar:0, rincian:[]}; dataK[o.kurir].cod += Number(o.total || 0); } }
                    else if (o.status === 'Gagal') g++;
                }
            });

            Object.values(semuaPengeluaran).forEach(i => {
                if (i.tanggal === tgl && i.kurir) {
                    if(!dataK[i.kurir]) dataK[i.kurir] = {cod:0, keluar:0, rincian:[]};
                    dataK[i.kurir].keluar += Number(i.nominal || 0);
                    dataK[i.kurir].rincian.push(`- ${i.keterangan} (Rp ${Number(i.nominal).toLocaleString()})`);
                }
            });

            document.getElementById('countGudang').innerText = gd; document.getElementById('countProses').innerText = p; document.getElementById('countSukses').innerText = s; document.getElementById('countGagal').innerText = g;

            let h = "";
            const keyTgl = tgl.replace(/\//g, '-');
            for (let n in dataK) {
                const k = dataK[n], sdh = Number((semuaSetoranKurir[keyTgl] || {})[n] || 0), sisa = k.cod - k.keluar - sdh;
                const clr = sisa > 0 ? 'var(--warning)' : 'var(--safe)';
                h += `<div class="glass-card" style="border-color:${clr}">
                    <b>🛵 ${n.toUpperCase()}</b>
                    <div style="font-size:11px; margin:5px 0;">COD: Rp ${k.cod.toLocaleString()} | Keluar: -Rp ${k.keluar.toLocaleString()}</div>
                    <div style="font-size:10px; color:var(--danger); margin-bottom:5px;">${k.rincian.join('<br>')}</div>
                    <div style="background:rgba(0,0,0,0.3); padding:8px; border-radius:8px; display:flex; justify-content:space-between;">
                        <span style="color:${clr}">SISA: Rp ${Math.max(0, sisa).toLocaleString()}</span>
                        ${sisa > 0 ? `<button onclick="terimaSetoran('${n}', ${sisa})" style="background:var(--safe); border:none; padding:2px 8px; border-radius:4px; color:#fff; font-size:10px;">TERIMA</button>` : '✅'}
                    </div>
                </div>`;
            }
            document.getElementById('keuanganKurirContainer').innerHTML = h || "<p style='text-align:center; opacity:0.5; font-size:10px;'>Belum ada aktivitas hari ini.</p>";
            renderList();
        }

        function terimaSetoran(n, j) {
            const t = document.getElementById('datePicker').value.split('-').reverse().join('-');
            if(confirm(`Terima Rp ${j.toLocaleString()} dari ${n}?`)) {
                db.ref(`setoran_kurir/${t}/${n}`).transaction(cv => (Number(cv) || 0) + j);
            }
        }

        function renderList() {
            const k = document.getElementById('searchBar').value.toLowerCase(), t = document.getElementById('datePicker').value.split('-').reverse().join('/');
            let h = "";
            const f = allOrders.filter(o => {
                const m = (o.namaPembeli||"").toLowerCase().includes(k) || (o.noPesanan||"").toLowerCase().includes(k);
                let st;
                if (currentFilter === "Semua") st = (o.status !== 'Terkirim' && o.status !== 'Gagal' && o.status !== 'Gudang');
                else if (currentFilter === "Gudang") st = (o.status === 'Gudang');
                else st = (o.status === currentFilter && o.tanggal === t);
                return m && st;
            });
            f.forEach(o => {
                h += `<div class="glass-card ${o.urgent?'card-urgent':''}">
                    <div style="font-size:10px; color:var(--gold);">${o.tanggal} | ${o.status}</div>
                    <b>${o.noPesanan} - ${o.namaPembeli}</b><br>
                    <small>Rp ${Number(o.total).toLocaleString()} | ${o.metode} ${o.kurir?'| 🛵 '+o.kurir:''}</small>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:10px;">
                        <button onclick="reprint('${o.id}')" style="background:var(--gold); border:none; padding:8px; border-radius:8px; font-size:10px;">PRINT</button>
                        <button onclick="hapus('${o.id}')" style="background:rgba(239,68,68,0.1); border:1px solid var(--danger); color:var(--danger); border-radius:8px; font-size:10px;">HAPUS</button>
                    </div>
                </div>`;
            });
            document.getElementById('adminList').innerHTML = h || "<p style='text-align:center; padding:20px; opacity:0.3;'>Kosong.</p>";
        }

        function tambah() {
            const n = new Date(), d = { noPesanan: document.getElementById('noPesanan').value || "#"+Date.now().toString().slice(-4), namaPembeli: document.getElementById('pembeli').value, nohp: document.getElementById('nohp').value, alamat: document.getElementById('alamat').value, mapLink: document.getElementById('mapLink').value, total: document.getElementById('total').value || 0, metode: document.getElementById('metodeBayar').value, urgent: document.getElementById('isUrgent').checked, status: 'Gudang', kurir: "", tanggal: formatTglDB(n), waktu: n.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}) };
            if(!d.namaPembeli || !d.nohp) return alert("Nama & WA wajib!");
            db.ref('pesanan').push(d).then(() => { 
                lastOrder = d; executePrint(); 
                document.getElementById('waPrompt').style.display = 'block';
                document.getElementById('btnWAOpen').onclick = () => { window.open(`https://wa.me/${d.nohp.replace(/\D/g,'').replace(/^0/,'62')}?text=${encodeURIComponent('*EJ TOBACCO* 📦\nHalo Kak *'+d.namaPembeli+'*\nPesanan Anda sedang diproses.\nTotal: *Rp '+Number(d.total).toLocaleString()+'*')}`, '_blank'); document.getElementById('waPrompt').style.display='none'; };
                ['noPesanan','pembeli','nohp','alamat','mapLink','total'].forEach(id => document.getElementById(id).value = "");
                document.getElementById('isUrgent').checked = false;
            });
        }

        function executePrint() {
            if(!lastOrder) return; const cleanNo = (lastOrder.noPesanan || "").replace(/\W/g, "");
            const teks = `[C]<font size="big"><b>EJ TOBACCO DELIVERY</b></font>\n[C]================================================\n[C]<font size="big"><b>RESI : ${lastOrder.noPesanan}</b></font>\n[C]================================================\n[L]PENERIMA: ${lastOrder.namaPembeli}\n[L]ALAMAT: ${lastOrder.alamat}\n[L]TOTAL: Rp ${Number(lastOrder.total).toLocaleString()}\n[C][b]code128,3,80,${cleanNo},yes\n\n\n\n`;
            window.location.href = "rawbt:" + encodeURI(teks);
        }

        function reprint(id) { lastOrder = allOrders.find(o => o.id === id); if(lastOrder) executePrint(); }
        function hapus(id) { if(confirm("Hapus?")) db.ref('pesanan/'+id).remove(); }
        function setFilter(f) { currentFilter = f; document.querySelectorAll('.report-box').forEach(el => el.classList.remove('active')); document.getElementById('f-'+f).classList.add('active'); renderList(); }
        function toggleTotal() { document.getElementById('total').style.display = document.getElementById('metodeBayar').value === 'Transfer' ? 'none' : 'block'; }
        function goToToday() { initDate(); updateAll(); }
        function bukaLaporan() { document.getElementById('laporanOverlay').style.display = 'flex'; }
        
        function hitungLaporan() {
            const bln = document.getElementById('bulanLaporan').value; if(!bln) return;
            let s=0, c=0, t=0, g=0;
            allOrders.forEach(o => {
                if(o.tanggal && o.tanggal.includes(bln.split('-')[1]+'/'+bln.split('-')[0])) {
                    if(o.status === 'Terkirim') { s++; if(o.metode==='COD') c+=Number(o.total||0); else t+=Number(o.total||0); }
                    else if(o.status === 'Gagal') g++;
                }
            });
            document.getElementById('isiLaporan').innerHTML = `📦 Sukses: ${s}<br>❌ Gagal: ${g}<br>💰 COD: Rp ${c.toLocaleString()}<br>💳 Transfer: Rp ${t.toLocaleString()}<br>💎 TOTAL: Rp ${(c+t).toLocaleString()}`;
        }

        let map, markers = {};
        function bukaRadar() {
            document.getElementById('radarOverlay').style.display = 'flex';
            if (!map) {
                map = L.map('mapRadar').setView([-6.8694, 109.0435], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                db.ref('tracking').on('value', snap => {
                    const data = snap.val(); if (!data) return;
                    for (let kurir in data) {
                        const k = data[kurir];
                        if (markers[kurir]) markers[kurir].setLatLng([k.lat, k.lng]);
                        else markers[kurir] = L.marker([k.lat, k.lng]).addTo(map).bindPopup(kurir.toUpperCase());
                    }
                });
            }
            setTimeout(() => { map.invalidateSize(); }, 500);
        }

        function bersihkanDataLama() {
            const BATAS = 90 * 24 * 60 * 60 * 1000, skrg = new Date().getTime();
            db.ref('pesanan').once('value', s => {
                const d = s.val(); if(!d) return;
                for (let id in d) {
                    const o = d[id]; if (o.tanggal) {
                        const p = o.tanggal.split('/'), tglP = new Date(`${p[2]}-${p[1]}-${p[0]}`).getTime();
                        if (skrg - tglP > BATAS) { db.ref('pesanan/'+id).remove(); db.ref('foto_bukti/'+id).remove(); }
                    }
                }
            });
        }
        setTimeout(bersihkanDataLama, 10000);
    </script>
</body>
</html>
